name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]      # 监听 main 分支的推送
  workflow_dispatch:       # 允许手动触发

# 设置 GITHUB_TOKEN 的权限以部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行的部署和最新的排队部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9   # 你可以指定你使用的 pnpm 版本，或者留空自动选择

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # 推荐使用 Node 20 或 18 以上
          cache: pnpm        # 启用 pnpm 依赖缓存

      - name: Install dependencies
        run: pnpm install --frozen-lockfile  # 严格根据 lock 文件安装

      - name: Build VitePress site
        run: pnpm run docs:build   # 如果你使用其他脚本名称，请修改这里

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist    # VitePress 默认输出目录，如有修改请相应调整

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
