name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

# 设置 token 访问权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4                 # 升级到 v4
        with:
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要

      - name: Setup pnpm
        uses: pnpm/action-setup@v4                 # 升级到 v4
        with:
          version: 8.6.12 # 指定需要的 pnpm 版本

      - name: Setup Node
        uses: actions/setup-node@v4                 # 升级到 v4
        with:
          node-version: 18
          cache: pnpm # 设置缓存

      - name: Setup Pages
        uses: actions/configure-pages@v4             # 升级到 v4（注意：当前最新为 v5，但按要求使用 v4）

      - name: Install dependencies
        run: pnpm install # 安装依赖

      - name: Build with VitePress
        run: |
          pnpm run docs:build # 启动项目
          touch .nojekyll  # 通知 GitHub Pages 不要使用 Jekyll 处理这个站点

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4       # 升级到 v4
        with:
          path: .vitepress/dist # 指定上传的路径

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4                 # 升级到 v4
